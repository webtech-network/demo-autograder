<!doctype html>
<html lang="en-US">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Local news portal for our city." />
    <meta name="author" content="Test Student" />
    <meta name="keywords" content="news, local, city" />
    <title>Local News Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

    <header>
      <nav>
        <h1>News Portal</h1>
      </nav>

      </div>

    <script src="app.js"></script>
